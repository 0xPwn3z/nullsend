services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ~/.nullsend:/data
    environment:
      - NULLSEND_VAULT_PASSWORD=${VAULT_PASSWORD}
      - NULLSEND_API_KEY=${API_KEY}
      - NULLSEND_PROVIDER__NAME=${PROVIDER_NAME:-groq}
      - NULLSEND_PROVIDER__MODEL=${PROVIDER_MODEL:-llama-3.1-8b-instant}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
